<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOUNDROOM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap');

  :root {
    --bg-main:    #121212;
    --bg-card:    rgba(255,255,255,0.04);
    --bg-player:  rgba(24,24,24,0.97);
    --border:     rgba(255,255,255,0.06);
    --accent:     #1db954;
    --accent-rgb: 29,185,84;
    --text-main:  #ffffff;
    --text-muted: #a7a7a7;
    --radius-lg:  16px;
    --radius-md:  8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-main);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 40px 24px 16px;
    background: linear-gradient(to bottom, var(--bg-main) 70%, transparent);
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-inner h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 24px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--text-main);
  }
  .header-inner p {
    font-size: 12px; font-weight: 500; color: var(--text-muted);
    margin-top: 2px;
  }

  .upload-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: 1px solid #535353; color: #fff;
    padding: 6px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s, background 0.15s;
  }
  .upload-btn:hover { border-color: #fff; background: rgba(255,255,255,0.06); }
  #fileInput { display: none; }

  main {
    position: fixed; inset: 0; overflow-y: auto;
    padding-top: 100px; padding-bottom: 220px;
    padding-left: 16px; padding-right: 16px;
    -webkit-overflow-scrolling: touch; z-index: 1;
  }

  .track-list { display: flex; flex-direction: column; }

  .track-item {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; border-radius: var(--radius-md);
    cursor: pointer; transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .track-item:hover  { background: rgba(255,255,255,0.06); }
  .track-item:active { background: rgba(255,255,255,0.04); }
  .track-item.active { background: rgba(var(--accent-rgb),0.08); }

  .track-num-col {
    width: 24px; text-align: center; flex-shrink: 0;
    font-size: 14px; color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .track-item.active .track-num-col { color: var(--accent); font-size: 12px; }

  .track-art {
    width: 40px; height: 40px; flex-shrink: 0;
    border-radius: 4px; background: #282828;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .track-art svg { color: #555; width: 18px; height: 18px; }

  .bars {
    display: none; position: absolute; inset: 0;
    align-items: flex-end; justify-content: center; gap: 2px;
    padding-bottom: 10px; background: rgba(0,0,0,0.4);
  }
  .track-item.playing .bars { display: flex; }
  .bar {
    width: 3px; border-radius: 1px; background: var(--accent);
    animation: bar-anim 0.8s ease-in-out infinite alternate;
  }
  .bar:nth-child(1){height:8px;  animation-delay:0s}
  .bar:nth-child(2){height:14px; animation-delay:0.2s}
  .bar:nth-child(3){height:6px;  animation-delay:0.4s}

  .track-info { flex: 1; min-width: 0; }
  .track-name {
    font-size: 14px; font-weight: 400; color: var(--text-main);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-item.active .track-name { color: var(--accent); font-weight: 600; }
  .track-artist { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .track-dur {
    font-size: 13px; color: var(--text-muted);
    font-variant-numeric: tabular-nums; flex-shrink: 0;
  }

  /* ── 플레이어 ── */
  .player {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: #181818; border-top: 1px solid rgba(255,255,255,0.08);
    padding: 12px 16px 32px;
    display: flex; flex-direction: column; gap: 10px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .player.has-track { transform: translateY(0); }

  .player-meta { display: flex; align-items: center; gap: 12px; }
  .player-thumb {
    width: 44px; height: 44px; flex-shrink: 0; border-radius: 4px;
    background: linear-gradient(135deg, #1db954 0%, #158a3e 100%);
  }
  .player-details { flex: 1; min-width: 0; }
  .player-title {
    font-size: 14px; font-weight: 600; color: var(--text-main);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .player-artist { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .heart-btn {
    background: none; border: none; color: var(--accent);
    cursor: pointer; padding: 4px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent; transition: transform 0.15s;
  }
  .heart-btn:active { transform: scale(0.85); }
  .heart-btn svg { width: 20px; height: 20px; }

  .progress-section { display: flex; flex-direction: column; gap: 4px; }
  .seek-wrap {
    position: relative; height: 18px; display: flex; align-items: center; cursor: pointer;
  }
  .seek-track {
    position: absolute; inset: 7px 0;
    height: 4px; border-radius: 2px; background: #535353;
  }
  .seek-fill { height: 100%; border-radius: 2px; background: var(--text-main); width: 0%; transition: background 0.2s; }
  .seek-wrap:hover .seek-fill { background: var(--accent); }
  .seek-thumb {
    position: absolute; top: 50%; transform: translate(-50%,-50%);
    width: 12px; height: 12px; border-radius: 50%; background: #fff;
    left: 0%; pointer-events: none; opacity: 0; transition: opacity 0.15s;
  }
  .seek-wrap:hover .seek-thumb,
  .seek-wrap.dragging .seek-thumb { opacity: 1; }
  .seek-input {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; -webkit-appearance: none; margin: 0;
  }
  .time-row {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums;
  }

  .player-controls {
    display: flex; align-items: center; justify-content: space-between; padding: 0 4px;
  }
  .ctrl-btn {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; transition: color 0.15s, transform 0.1s; padding: 4px;
  }
  .ctrl-btn:hover { color: var(--text-main); }
  .ctrl-btn:active { transform: scale(0.88); }
  .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .ctrl-btn svg { width: 20px; height: 20px; }
  .play-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--text-main); color: #000;
    transition: transform 0.1s, background 0.15s;
  }
  .play-btn:hover { background: #e0e0e0; transform: scale(1.06); }
  .play-btn:active { transform: scale(0.94); }
  .play-btn svg { width: 18px; height: 18px; fill: #000; }

  .toggle-btn.active { color: var(--accent); }
  .toggle-btn-repeat { position: relative; }
  .toggle-btn-repeat::after {
    content: '1'; font-size: 7px; font-weight: 700;
    position: absolute; top: 0; right: 0;
    background: var(--accent); color: #000;
    width: 9px; height: 9px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
  }
  .toggle-btn-repeat.one::after { display: flex; }

  .vol-row { display: flex; align-items: center; gap: 8px; padding: 0 4px; }
  .vol-icon { color: var(--text-muted); flex-shrink: 0; }
  .vol-slider-wrap {
    flex: 1; position: relative; height: 18px;
    display: flex; align-items: center; cursor: pointer;
  }
  .vol-track {
    position: absolute; inset: 7px 0;
    height: 4px; border-radius: 2px; background: #535353;
  }
  .vol-fill { height: 100%; border-radius: 2px; background: var(--text-main); width: 40%; transition: background 0.2s; }
  .vol-slider-wrap:hover .vol-fill { background: var(--accent); }
  .vol-thumb {
    position: absolute; top: 50%; transform: translate(-50%,-50%);
    width: 12px; height: 12px; border-radius: 50%; background: #fff;
    left: 40%; pointer-events: none; opacity: 0; transition: opacity 0.15s;
  }
  .vol-slider-wrap:hover .vol-thumb,
  .vol-slider-wrap.dragging .vol-thumb { opacity: 1; }
  .vol-input {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; -webkit-appearance: none; margin: 0;
  }
  .vol-label {
    font-size: 11px; color: var(--text-muted);
    font-variant-numeric: tabular-nums; min-width: 24px; text-align: right;
  }

  @keyframes bar-anim {
    from { transform: scaleY(0.4); }
    to   { transform: scaleY(1); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>내 플레이리스트</h1>
      <p id="libLabel">0곡</p>
    </div>
    <label class="upload-btn" for="fileInput">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      파일 추가
    </label>
    <input type="file" id="fileInput" accept="audio/*" multiple>
  </div>
</header>

<main>
  <div class="track-list" id="trackList"></div>
</main>

<div class="player" id="player">
  <div class="player-meta">
    <div class="player-thumb"></div>
    <div class="player-details">
      <div class="player-title" id="playerTitle">재생 중인 곡 없음</div>
      <div class="player-artist" id="playerArtist">—</div>
    </div>
    <button class="heart-btn" aria-label="좋아요">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
  </div>

  <div class="progress-section">
    <div class="seek-wrap" id="seekWrap">
      <div class="seek-track"><div class="seek-fill" id="seekFill"></div></div>
      <div class="seek-thumb" id="seekThumb"></div>
      <input type="range" class="seek-input" id="seekInput" min="0" max="100" step="0.05" value="0">
    </div>
    <div class="time-row">
      <span id="timeCurrent">0:00</span>
      <span id="timeDuration">0:00</span>
    </div>
  </div>

  <div class="player-controls">
    <button class="ctrl-btn toggle-btn" id="shuffleBtn" aria-label="셔플">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
    </button>
    <button class="ctrl-btn" id="prevBtn" aria-label="이전 곡">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
    </button>
    <button class="ctrl-btn play-btn" id="playBtn" aria-label="재생/일시정지">
      <svg id="iconPlay"  viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
    </button>
    <button class="ctrl-btn" id="nextBtn" aria-label="다음 곡">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
    </button>
    <button class="ctrl-btn toggle-btn toggle-btn-repeat" id="repeatBtn" aria-label="반복">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </button>
  </div>

  <div class="vol-row">
    <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
    <div class="vol-slider-wrap" id="volWrap">
      <div class="vol-track"><div class="vol-fill" id="volFill"></div></div>
      <div class="vol-thumb" id="volThumb"></div>
      <input type="range" class="vol-input" id="volInput" min="0" max="100" step="1" value="40">
    </div>
    <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    <span class="vol-label" id="volLabel">40</span>
  </div>
</div>

<audio id="audioEl"></audio>

<script>
  const audio        = document.getElementById('audioEl');
  const trackList    = document.getElementById('trackList');
  const playerEl     = document.getElementById('player');
  const playerTitle  = document.getElementById('playerTitle');
  const playerArtist = document.getElementById('playerArtist');
  const seekFill     = document.getElementById('seekFill');
  const seekThumb    = document.getElementById('seekThumb');
  const seekInput    = document.getElementById('seekInput');
  const seekWrap     = document.getElementById('seekWrap');
  const timeCurrent  = document.getElementById('timeCurrent');
  const timeDuration = document.getElementById('timeDuration');
  const playBtn      = document.getElementById('playBtn');
  const iconPlay     = document.getElementById('iconPlay');
  const iconPause    = document.getElementById('iconPause');
  const prevBtn      = document.getElementById('prevBtn');
  const nextBtn      = document.getElementById('nextBtn');
  const shuffleBtn   = document.getElementById('shuffleBtn');
  const repeatBtn    = document.getElementById('repeatBtn');
  const volInput     = document.getElementById('volInput');
  const volFill      = document.getElementById('volFill');
  const volThumb     = document.getElementById('volThumb');
  const volLabel     = document.getElementById('volLabel');
  const volWrap      = document.getElementById('volWrap');
  const libLabel     = document.getElementById('libLabel');
  const fileInput    = document.getElementById('fileInput');

  let tracks = [];

fetch('./songs.json')
  .then(res => res.json())
  .then(data => {
    tracks = data;
    renderList();
  });
  let currentIdx   = -1;
  let isPlaying    = false;
  let isShuffle    = false;
  let repeatMode   = 0;
  let shuffleQueue = [];
  let isSeeking    = false;
  let trackDurations = {};

  /* ── 파일 업로드 ── */
  fileInput.addEventListener('change', e => {
    Array.from(e.target.files).forEach(f => {
      if (!f.type.startsWith('audio/')) return;
      const url  = URL.createObjectURL(f);
      const name = f.name.replace(/\.[^/.]+$/, '');
      const idx  = tracks.length;
      tracks.push({ name, artist: '알 수 없는 아티스트', url });
      const tmp = new Audio(url);
      tmp.addEventListener('loadedmetadata', () => {
        trackDurations[idx] = tmp.duration;
        renderList();
      });
    });
    e.target.value = '';
    renderList();
  });

  /* ── 진행바 ── */
  function setSeekUI(pct) {
    seekFill.style.width = pct + '%';
    seekThumb.style.left = pct + '%';
    seekInput.value = pct;
  }

  audio.addEventListener('timeupdate', () => {
    if (isSeeking || !audio.duration) return;
    setSeekUI((audio.currentTime / audio.duration) * 100);
    timeCurrent.textContent = fmtTime(audio.currentTime);
  });
  audio.addEventListener('loadedmetadata', () => {
    timeDuration.textContent = fmtTime(audio.duration);
    trackDurations[currentIdx] = audio.duration;
    renderList();
  });

  seekInput.addEventListener('mousedown',  () => { isSeeking = true;  seekWrap.classList.add('dragging'); });
  seekInput.addEventListener('touchstart', () => { isSeeking = true;  seekWrap.classList.add('dragging'); }, { passive: true });
  seekInput.addEventListener('input', e => {
    const pct = parseFloat(e.target.value);
    setSeekUI(pct);
    if (audio.duration) timeCurrent.textContent = fmtTime(audio.duration * pct / 100);
  });
  seekInput.addEventListener('change', e => {
    if (audio.duration) audio.currentTime = audio.duration * parseFloat(e.target.value) / 100;
    isSeeking = false; seekWrap.classList.remove('dragging');
  });
  seekInput.addEventListener('mouseup',  () => { isSeeking = false; seekWrap.classList.remove('dragging'); });
  seekInput.addEventListener('touchend', () => { isSeeking = false; seekWrap.classList.remove('dragging'); });

  /* ── 볼륨 (로그 곡선) ── */
  function setVolUI(v) {
    volFill.style.width  = v + '%';
    volThumb.style.left  = v + '%';
    volLabel.textContent = Math.round(v);
    audio.volume = Math.pow(v / 100, 2.5);
  }

  volInput.addEventListener('mousedown',  () => volWrap.classList.add('dragging'));
  volInput.addEventListener('touchstart', () => volWrap.classList.add('dragging'), { passive: true });
  volInput.addEventListener('input',  e  => setVolUI(parseFloat(e.target.value)));
  volInput.addEventListener('mouseup',  () => volWrap.classList.remove('dragging'));
  volInput.addEventListener('touchend', () => volWrap.classList.remove('dragging'));
  setVolUI(40);

  /* ── 렌더링 ── */
  function renderList() {
    libLabel.textContent = `${tracks.length}곡`;
    trackList.innerHTML  = '';

    if (tracks.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'text-align:center;padding:60px 0;color:#535353;font-size:14px;line-height:2;';
      empty.innerHTML = `<div style="font-size:36px;margin-bottom:8px">♪</div>상단 버튼으로 음악을 추가하세요`;
      trackList.appendChild(empty);
      return;
    }

    tracks.forEach((t, i) => {
      const active  = i === currentIdx;
      const playing = active && isPlaying;
      const dur     = trackDurations[i] ? fmtTime(trackDurations[i]) : '—';
      const item    = document.createElement('div');
      item.className = 'track-item' + (active ? ' active' : '') + (playing ? ' playing' : '');
      item.innerHTML = `
        <div class="track-num-col">
          ${active
            ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`
            : `<span>${i + 1}</span>`}
        </div>
        <div class="track-art">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        </div>
        <div class="track-info">
          <div class="track-name">${esc(t.name)}</div>
          <div class="track-artist">${esc(t.artist)}</div>
        </div>
        <div class="track-dur">${dur}</div>`;
      item.addEventListener('click', () => selectTrack(i));
      trackList.appendChild(item);
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── 재생 제어 ── */
  function selectTrack(idx) {
    if (idx < 0 || idx >= tracks.length) return;
    if (idx === currentIdx) { togglePlay(); return; }
    currentIdx = idx;
    audio.src  = tracks[idx].url;
    audio.play().catch(() => {});
    isPlaying  = true;
    playerEl.classList.add('has-track');
    playerTitle.textContent  = tracks[idx].name;
    playerArtist.textContent = tracks[idx].artist;
    setSeekUI(0);
    timeCurrent.textContent  = '0:00';
    timeDuration.textContent = trackDurations[idx] ? fmtTime(trackDurations[idx]) : '0:00';
    updatePlayIcon(); updateNavBtns(); renderList();
    if (isShuffle) {
      const qi = shuffleQueue.indexOf(idx);
      if (qi > -1) shuffleQueue.splice(qi, 1);
    }
  }

  function togglePlay() {
    if (currentIdx < 0 && tracks.length > 0) {
      isShuffle ? (initiateShuffleQueue(), selectTrack(shuffleQueue.shift())) : selectTrack(0);
      return;
    }
    if (audio.paused) { audio.play().catch(() => {}); isPlaying = true; }
    else              { audio.pause(); isPlaying = false; }
    updatePlayIcon(); renderList();
  }

  function updatePlayIcon() {
    iconPlay.style.display  = isPlaying ? 'none'  : 'block';
    iconPause.style.display = isPlaying ? 'block' : 'none';
  }

  function updateNavBtns() {
    prevBtn.disabled = !isShuffle && repeatMode === 0 && currentIdx === 0;
    nextBtn.disabled = !isShuffle && repeatMode === 0 && currentIdx === tracks.length - 1 && shuffleQueue.length === 0;
  }

  audio.addEventListener('ended', () => {
    if (repeatMode === 2) { audio.currentTime = 0; audio.play().catch(() => {}); return; }
    nextTrack();
  });

  function nextTrack() {
    if (repeatMode === 2) { audio.currentTime = 0; audio.play().catch(() => {}); return; }
    if (isShuffle) {
      if (!shuffleQueue.length) {
        if (repeatMode === 1) { initiateShuffleQueue(); if (shuffleQueue.length) { selectTrack(shuffleQueue.shift()); return; } }
        isPlaying = false; updatePlayIcon(); renderList(); return;
      }
      selectTrack(shuffleQueue.shift());
    } else {
      if (currentIdx < tracks.length - 1) selectTrack(currentIdx + 1);
      else if (repeatMode === 1) selectTrack(0);
    }
  }

  function prevTrack() {
    if (audio.currentTime > 4) { audio.currentTime = 0; return; }
    if (isShuffle) { initiateShuffleQueue(); if (shuffleQueue.length) selectTrack(shuffleQueue.shift()); }
    else {
      if (currentIdx > 0) selectTrack(currentIdx - 1);
      else if (repeatMode === 1) selectTrack(tracks.length - 1);
    }
  }

  function initiateShuffleQueue() {
    shuffleQueue = tracks.map((_, i) => i).filter(i => i !== currentIdx);
    for (let i = shuffleQueue.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffleQueue[i], shuffleQueue[j]] = [shuffleQueue[j], shuffleQueue[i]];
    }
  }

  playBtn.addEventListener('click', togglePlay);
  prevBtn.addEventListener('click', prevTrack);
  nextBtn.addEventListener('click', nextTrack);

  shuffleBtn.addEventListener('click', () => {
    isShuffle = !isShuffle;
    shuffleBtn.classList.toggle('active', isShuffle);
    if (isShuffle && currentIdx > -1) initiateShuffleQueue();
    updateNavBtns();
  });

  repeatBtn.addEventListener('click', () => {
    repeatMode = (repeatMode + 1) % 3;
    repeatBtn.className = 'ctrl-btn toggle-btn toggle-btn-repeat';
    if (repeatMode === 1) repeatBtn.classList.add('active');
    if (repeatMode === 2) repeatBtn.classList.add('active', 'one');
    updateNavBtns();
  });

  function fmtTime(s) {
    if (!isFinite(s)) return '0:00';
    return Math.floor(s / 60) + ':' + Math.floor(s % 60).toString().padStart(2, '0');
  }

  renderList();
</script>
</body>
</html>
