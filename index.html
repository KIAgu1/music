<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOUNDROOM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght=400;500;600;700&family=Plus+Jakarta+Sans:wght=500;600;700&display=swap');

  :root {
    --bg-main:     #080710;
    --bg-card:     rgba(255, 255, 255, 0.03);
    --bg-player:   rgba(13, 12, 22, 0.92);
    --border:      rgba(255, 255, 255, 0.05);
    --accent:      #bd93f9;
    --accent-rgb:  189, 147, 249;
    --text-main:   #f8f8f2;
    --text-muted:  #6272a4;
    --radius-lg:   24px;
    --radius-md:   16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-main);
    color: var(--text-main);
    font-family: 'Pretendard', sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  /* ── 헤더 ── */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 32px 24px 20px;
    background: linear-gradient(to bottom, var(--bg-main) 60%, transparent);
  }

  .header-inner {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .header-inner h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-inner p {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── 메인 콘텐츠 ── */
  main {
    position: fixed; inset: 0;
    overflow-y: auto;
    padding-top: 110px;
    padding-bottom: 240px;
    padding-left: 24px; padding-right: 24px;
    -webkit-overflow-scrolling: touch;
    z-index: 1;
  }

  .track-list { 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
  }

  .track-item {
    display: flex; align-items: center; gap: 16px;
    padding: 12px;
    border-radius: var(--radius-md);
    background: var(--bg-card);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-tap-highlight-color: transparent;
  }
  
  .track-item:active { transform: scale(0.98); }
  
  .track-item.active {
    background: rgba(var(--accent-rgb), 0.1);
    border-color: rgba(var(--accent-rgb), 0.3);
  }

  .track-art {
    width: 48px; height: 48px; flex-shrink: 0;
    border-radius: 12px;
    background: linear-gradient(135deg, #282a36 0%, #111217 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  
  .track-art svg { color: var(--text-muted); width: 20px; height: 20px; }

  .bars {
    display: none;
    position: absolute; inset: 0;
    align-items: center; justify-content: center; gap: 3px;
    background: rgba(0, 0, 0, 0.5);
  }
  .track-item.playing .bars { display: flex; }
  .bar {
    width: 3px; height: 4px; border-radius: 2px;
    background: var(--accent);
    animation: bounce 0.6s ease-in-out infinite alternate;
  }
  .bar:nth-child(1) { animation-delay: 0.1s; }
  .bar:nth-child(2) { animation-delay: 0.3s; }
  .bar:nth-child(3) { animation-delay: 0.5s; }

  .track-info { flex: 1; min-width: 0; }
  .track-name {
    font-size: 15px; font-weight: 600;
    color: var(--text-main);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-item.active .track-name { color: var(--accent); }
  .track-artist {
    font-size: 12px; color: var(--text-muted);
    margin-top: 3px;
  }

  /* ── 하단 고정 플레이어 ── */
  .player {
    position: fixed; bottom: 24px; left: 24px; right: 24px;
    z-index: 200;
    background: var(--bg-player);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex; flex-direction: column; gap: 14px;
    transform: translateY(240px);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
  }
  .player.has-track { transform: translateY(0); }

  /* 진행 바 */
  .progress-container { display: flex; flex-direction: column; gap: 6px; }
  .progress-wrap {
    height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1);
    position: relative; cursor: pointer; padding: 2px 0;
  }
  .progress-bg { height: 100%; width: 100%; background: rgba(255,255,255,0.08); border-radius: 2px; position: relative; }
  .progress-fill {
    height: 100%; border-radius: 2px; background: var(--accent); width: 0%;
  }
  .time-row {
    display: flex; justify-content: space-between;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; color: var(--text-muted);
    font-weight: 500;
  }

  /* 곡 메타 정보 */
  .player-meta { display: flex; align-items: center; gap: 14px; }
  .player-thumb {
    width: 48px; height: 48px; flex-shrink: 0;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--accent) 0%, #ff79c6 100%);
    box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.3);
  }
  .player-details { flex: 1; min-width: 0; }
  .player-title {
    font-size: 15px; font-weight: 700; color: var(--text-main);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .player-artist { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

  /* ⚙️ 컨트롤 툴 바 */
  .player-utils {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.03);
  }
  
  .util-left { display: flex; align-items: center; gap: 16px; }

  /* 🔊 100% 작동 보장 슬라이더 개조 */
  .volume-container { display: flex; align-items: center; gap: 8px; width: 100px; }
  
  .volume-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.15);
    outline: none;
    cursor: pointer;
  }

  /* 슬라이더 손잡이 조절 (크롬/사파리/모바일 브라우저 전용) */
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--text-main);
    transition: transform 0.1s;
  }
  .volume-slider::-webkit-slider-thumb:active {
    transform: scale(1.4);
  }

  /* 슬라이더 손잡이 조절 (파이어폭스 전용) */
  .volume-slider::-moz-range-thumb {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--text-main);
    border: none;
    transition: transform 0.1s;
  }
  .volume-slider::-moz-range-thumb:active {
    transform: scale(1.4);
  }

  /* 토글식 유틸 버튼 스타일 */
  .toggle-btn { color: var(--text-muted); }
  .toggle-btn.active { color: var(--accent); filter: drop-shadow(0 0 4px rgba(var(--accent-rgb), 0.5)); }
  .toggle-btn-repeat { position: relative; }
  .toggle-btn-repeat::after {
    content: '1'; font-size: 8px; font-weight: bold; position: absolute; top: 1px; right: 0;
    background: var(--accent); color: var(--bg-main); width: 10px; height: 10px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
  }
  .toggle-btn-repeat.one::after { display: flex; }

  /* 컨트롤 메인 버튼 그룹 */
  .player-controls {
    display: flex; align-items: center; justify-content: center; gap: 24px;
  }

  .ctrl-btn {
    background: none; border: none; color: var(--text-main);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; transition: transform 0.1s, color 0.2s;
  }
  .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .ctrl-btn:active:not(:disabled) { transform: scale(0.9); }
  .ctrl-btn svg { width: 20px; height: 20px; }

  .play-btn {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--text-main); color: var(--bg-main);
    box-shadow: 0 6px 16px rgba(255,255,255,0.1);
  }
  .play-btn svg { width: 22px; height: 22px; fill: var(--bg-main); }

  @keyframes bounce {
    from { transform: scaleY(0.3); }
    to { transform: scaleY(1.1); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <p id="libLabel">MY PLAYLIST</p>
    <h1>SOUNDROOM</h1>
  </div>
</header>

<main>
  <div class="track-list" id="trackList"></div>
</main>

<div class="player" id="player">
  <div class="progress-container">
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="time-row">
      <span id="timeCurrent">0:00</span>
      <span id="timeDuration">0:00</span>
    </div>
  </div>

  <div class="player-meta">
    <div class="player-thumb"></div>
    <div class="player-details">
      <div class="player-title" id="playerTitle">재생 중인 곡 없음</div>
      <div class="player-artist" id="playerArtist">Artist</div>
    </div>
  </div>

  <div class="player-controls">
    <button class="ctrl-btn" id="prevBtn" aria-label="이전 곡">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
    </button>
    <button class="ctrl-btn play-btn" id="playBtn" aria-label="재생/일시정지">
      <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"></polygon></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>
    </button>
    <button class="ctrl-btn" id="nextBtn" aria-label="다음 곡">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
    </button>
  </div>

  <div class="player-utils">
    <div class="util-left">
      <button class="ctrl-btn toggle-btn" id="shuffleBtn" aria-label="셔플 상태 토글">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
      </button>
      <button class="ctrl-btn toggle-btn toggle-btn-repeat" id="repeatBtn" aria-label="반복 상태 순환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
      </button>
    </div>
    
    <div class="volume-container">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;color:var(--text-muted);"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
    </div>
  </div>
</div>

<audio id="audioEl"></audio>

<script>
  const audio       = document.getElementById('audioEl');
  const trackList   = document.getElementById('trackList');
  const playerEl    = document.getElementById('player');
  const playerTitle = document.getElementById('playerTitle');
  const playerArtist= document.getElementById('playerArtist');
  const progressFill= document.getElementById('progressFill');
  const progressWrap= document.getElementById('progressWrap');
  const timeCurrent = document.getElementById('timeCurrent');
  const timeDuration= document.getElementById('timeDuration');
  const playBtn     = document.getElementById('playBtn');
  const iconPlay    = document.getElementById('iconPlay');
  const iconPause   = document.getElementById('iconPause');
  const prevBtn     = document.getElementById('prevBtn');
  const nextBtn     = document.getElementById('nextBtn');
  const shuffleBtn  = document.getElementById('shuffleBtn');
  const repeatBtn   = document.getElementById('repeatBtn');
  const volumeSlider= document.getElementById('volumeSlider');
  const libLabel    = document.getElementById('libLabel');

  let tracks = [
    { name: "Heavy Serenade", artist: "엔믹스", url: "https://res.cloudinary.com/dhgv4vln9/video/upload/v1780227297/songs_song1_rpxlmj.mp3" },
    { name: "노래 제목 2", artist: "아티스트 2", url: "https://raw.githubusercontent.com/본인아이디/저장소이름/main/songs/song2.mp3" }
  ];

  let currentIdx = -1;
  let isPlaying = false;
  let isShuffle = false;
  let repeatMode = 0; // 0:안함, 1:전체, 2:한곡
  let shuffleQueue = [];

  function renderList() {
    libLabel.textContent = `MY PLAYLIST · ${tracks.length}`;
    trackList.innerHTML = '';
    
    tracks.forEach((t, i) => {
      const item = document.createElement('div');
      const isCurrent = (i === currentIdx);
      item.className = 'track-item' + (isCurrent ? ' active' + (isPlaying ? ' playing' : '') : '');
      item.innerHTML = `
        <div class="track-art">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
          <div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        </div>
        <div class="track-info">
          <div class="track-name">${t.name}</div>
          <div class="track-artist">${t.artist}</div>
        </div>
      `;
      item.addEventListener('click', () => selectTrack(i));
      trackList.appendChild(item);
    });
  }

  function selectTrack(idx) {
    if (idx < 0 || idx >= tracks.length) return;
    if (idx === currentIdx) { togglePlay(); return; }
    currentIdx = idx;
    audio.src = tracks[currentIdx].url;
    audio.play().catch(()=>{});
    isPlaying = true;
    playerEl.classList.add('has-track');
    updatePlayerUI();
    renderList();
    
    if (isShuffle && shuffleQueue.length > 0) {
      const qIdx = shuffleQueue.indexOf(idx);
      if(qIdx > -1) shuffleQueue.splice(qIdx, 1);
    }
  }

  function togglePlay() {
    if (currentIdx < 0 && tracks.length > 0) { 
      if(isShuffle) { initiateShuffleQueue(); selectTrack(shuffleQueue.shift()); } 
      else { selectTrack(0); }
      return; 
    }
    if (audio.paused) { audio.play().catch(()=>{}); isPlaying = true; } 
    else { audio.pause(); isPlaying = false; }
    updatePlayIcon();
    renderList();
  }

  function updatePlayIcon() {
    iconPlay.style.display  = isPlaying ? 'none' : 'block';
    iconPause.style.display = isPlaying ? 'block' : 'none';
  }

  function updatePlayerUI() {
    const t = tracks[currentIdx];
    playerTitle.textContent = t.name;
    playerArtist.textContent = t.artist;
    updatePlayIcon();
    
    prevBtn.disabled = (!isShuffle && repeatMode === 0 && currentIdx === 0);
    nextBtn.disabled = (!isShuffle && repeatMode === 0 && currentIdx === tracks.length - 1 && shuffleQueue.length === 0);
  }

  function initiateShuffleQueue() {
    shuffleQueue = tracks.map((_, i) => i).filter(i => i !== currentIdx);
    for (let i = shuffleQueue.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffleQueue[i], shuffleQueue[j]] = [shuffleQueue[j], shuffleQueue[i]];
    }
  }

  shuffleBtn.addEventListener('click', () => {
    isShuffle = !isShuffle;
    shuffleBtn.classList.toggle('active', isShuffle);
    if(isShuffle && currentIdx > -1) initiateShuffleQueue();
    updatePlayerUI();
  });

  repeatBtn.addEventListener('click', () => {
    repeatMode = (repeatMode + 1) % 3;
    repeatBtn.className = 'ctrl-btn toggle-btn toggle-btn-repeat';
    if (repeatMode === 1) repeatBtn.classList.add('active');
    else if (repeatMode === 2) repeatBtn.classList.add('active', 'one');
    updatePlayerUI();
  });

  function nextTrack() {
    if (repeatMode === 2) { audio.currentTime = 0; audio.play().catch(()=>{}); return; }
    if (isShuffle) {
      if (shuffleQueue.length === 0) {
        if (repeatMode === 1) { initiateShuffleQueue(); if(shuffleQueue.length > 0) { selectTrack(shuffleQueue.shift()); return; } }
        isPlaying = false; renderList(); updatePlayIcon(); return;
      }
      selectTrack(shuffleQueue.shift());
    } else {
      if (currentIdx < tracks.length - 1) selectTrack(currentIdx + 1);
      else if (repeatMode === 1) selectTrack(0);
    }
  }

  function prevTrack() {
    if (audio.currentTime > 4) { audio.currentTime = 0; return; }
    if (isShuffle) { initiateShuffleQueue(); if(shuffleQueue.length > 0) selectTrack(shuffleQueue.shift()); } 
    else {
      if (currentIdx > 0) selectTrack(currentIdx - 1);
      else if (repeatMode === 1) selectTrack(tracks.length - 1);
    }
  }

  playBtn.addEventListener('click', togglePlay);
  prevBtn.addEventListener('click', prevTrack);
  nextBtn.addEventListener('click', nextTrack);

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    timeCurrent.textContent = fmtTime(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => { timeDuration.textContent = fmtTime(audio.duration); });
  audio.addEventListener('ended', () => { if (repeatMode === 2) { audio.currentTime = 0; audio.play().catch(()=>{}); } else { nextTrack(); } });

  progressWrap.addEventListener('click', e => {
    if (!audio.duration) return;
    const rect = progressWrap.getBoundingClientRect();
    const pct  = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  /* 🔊 100% 볼륨 조절 리스너 연동 완료 */
  volumeSlider.addEventListener('input', (e) => {
    audio.volume = e.target.value;
  });

  function fmtTime(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  // 초기 설정
  audio.volume = 0.8;
  renderList();
</script>
</body>
</html>
